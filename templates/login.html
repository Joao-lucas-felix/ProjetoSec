<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        margin: 0;
        padding: 0;
        color: #e2e8f0;
    }

    .container {
        max-width: 500px;
        margin: 80px auto;
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h1, h2 {
        text-align: center;
        color: #38bdf8;
    }

    p {
        text-align: center;
        color: #cbd5f5;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: #0f172a;
        color: #e2e8f0;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #38bdf8;
        color: #0f172a;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0ea5e9;
    }

    a {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #38bdf8;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    .alert {
        background: #7f1d1d;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        margin-top: 15px;
    }
    pre {
        background: black;
        color: lime;
        padding: 15px;
        border-radius: 8px;
        overflow-x: auto;
    }

    .success { color: lime; }
    .error { color: red; }
    .warning { color: orange; }
</style>
</head>
<body>

<div class="container">

<h2>Login</h2>

<form method="POST">

<label>Username</label>
<input name="username">

<label>Password</label>
<input name="password">

<button type="submit">Entrar</button>

</form>

<a href="/esqueci_senha">Esqueci minha senha</a>

<hr>

{% if query %}
    <h3>🧾 Query executada:</h3>
    <pre>{{query}}</pre>
{% endif %}

{% if result %}
    {% if user %}
        <p class="success">✅ {{result}}: {{user[1]}}</p>
        <p class="warning">⚠️ Possível SQL Injection detectado</p>
    {% else %}
        <p class="error">❌ {{result}}</p>
    {% endif %}
{% endif %}

{% if error %}
    <p class="error">Erro SQL: {{error}}</p>
{% endif %}

</div>

</body>

</html>
